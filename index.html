<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE A MAN</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            letter-spacing: -4px;
            color: #f8fafc;
            text-shadow: 4px 4px 0 #020617, -2px -2px 0 #1e2937;
            -webkit-text-stroke: 2px #020617;
        }

        .manly-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgb(15 23 42 / 0.1), 0 4px 6px -4px rgb(15 23 42 / 0.1);
            border: 3px solid #1e2937;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        
        .app-container {
            max-width: 420px;
            margin: 0 auto;
            min-height: 100dvh;
            background: #020617;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
            position: relative;
            overflow: hidden;
            border: 8px solid #1e2937;
            border-radius: 3rem;
        }

        .app-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle, rgba(245, 158, 11, 0.18) 2px, transparent 2px),
                radial-gradient(circle, rgba(245, 158, 11, 0.09) 1px, transparent 1px),
                linear-gradient(135deg, transparent 45%, rgba(251, 191, 36, 0.06) 50%, transparent 55%);
            background-size: 24px 24px, 14px 14px, 90px 90px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.85;
            mix-blend-mode: screen;
        }

        .quote-card {
            background: linear-gradient(145deg, #1e2937, #0f172a);
            border: 5px solid #0f172a;
            box-shadow: 8px 8px 0 #020617, -3px -3px 0 #334155, 0 0 0 2px #475569;
        }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <div class="app-container mx-auto">
        <!-- HOME, FAVORITES, SETTINGS screens stay the same as before -->
        <!-- ... (keeping your existing screens for brevity - use the previous full version) ... -->

        <!-- SETTINGS SCREEN (Notification part updated) -->
        <div id="settings-screen" class="screen h-full flex flex-col bg-slate-900 hidden">
            <div class="px-6 pt-8 pb-4 flex items-center border-b border-slate-800">
                <button onclick="showScreen('home-screen')" class="flex items-center gap-2 text-slate-400">← Back</button>
                <h2 class="font-bold text-2xl ml-4">Settings</h2>
            </div>
            
            <div class="p-6 space-y-8 flex-1">
                <div>
                    <h3 class="font-bold mb-3">Daily Notifications</h3>
                    <label class="relative inline-flex items-center cursor-pointer mb-4">
                        <input type="checkbox" id="notif-toggle" onchange="toggleNotifications()" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
                    </label>

                    <div id="notification-controls" class="hidden bg-slate-800 border border-slate-700 rounded-3xl p-5 space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-300 mb-2">Choose Time</label>
                            <input type="time" id="notif-time" value="07:00" class="bg-slate-900 border border-slate-600 text-white rounded-2xl px-4 py-3 w-full">
                        </div>
                        
                        <button onclick="scheduleDailyNotification()" 
                                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-3xl">
                            SCHEDULE DAILY NOTIFICATION
                        </button>
                        <p id="notification-status" class="text-center text-xs text-emerald-400"></p>
                    </div>
                </div>

                <button onclick="showPrivacyPolicy()" class="w-full bg-slate-800 py-4 rounded-3xl text-left px-6 font-semibold">
                    Privacy Policy
                </button>
            </div>
        </div>
    </div>

    <script>
        let quotes = [];
        let currentQuote = "";
        let favorites = JSON.parse(localStorage.getItem('beaman_favorites')) || [];

        // Load quotes from JSON (preferred)
        async function loadQuotes() {
            try {
                const response = await fetch('quotes.json');
                quotes = await response.json();
            } catch (e) {
                console.log("Using fallback quotes");
                // Fallback quotes...
                quotes = ["Don’t go food shopping. Starve. Die. Be a man."];
            }
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            if (screenId === 'favorites-screen') renderFavorites();
        }

        function generateQuote() { ... } // keep your existing function

        // Improved Notification System
        async function scheduleDailyNotification() {
            const time = document.getElementById('notif-time').value;
            const statusEl = document.getElementById('notification-status');
            
            if (!time) return alert("Please select a time");

            localStorage.setItem('beaman_notif_time', time);
            localStorage.setItem('beaman_notifications_enabled', 'true');

            statusEl.innerHTML = `✅ Notification scheduled daily at <strong>${time}</strong>`;

            // Request permission
            if (Notification.permission === 'default') {
                await Notification.requestPermission();
            }

            // Demo immediate notification
            if (Notification.permission === 'granted') {
                new Notification("Be A Man", {
                    body: "Test notification working! Real daily ones coming soon.",
                    icon: "https://yourdomain.com/icon.png" // optional
                });
            }
        }

        function toggleNotifications() {
            const controls = document.getElementById('notification-controls');
            controls.classList.toggle('hidden');
        }

        function showPrivacyPolicy() {
            window.open('privacy.html', '_blank');
        }

        // Init
        window.onload = async () => {
            await loadQuotes();
            generateQuote();
            loadNotificationSettings(); // your existing function
        };
    </script>
</body>
</html>
