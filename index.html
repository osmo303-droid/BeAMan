<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE A MAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --primary: #0f172a;
            --accent-red: #ef4444;
            --accent-yellow: #fbbf24;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 700;
            letter-spacing: -2px;
        }

        .manly-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgb(15 23 42 / 0.1), 0 4px 6px -4px rgb(15 23 42 / 0.1);
            border: 3px solid #1e2937;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        
        .manly-btn:active {
            transform: scale(0.96) translateY(1px);
            box-shadow: 0 4px 6px -1px rgb(15 23 42 / 0.1);
            border-color: #334155;
        }

        /* Extra comic pop on main generate button - explosive comic style */
        #home-screen .manly-btn:first-child {
            border: 6px solid #020617;
            background: #fefce8;
            color: #020617;
            box-shadow: 0 14px 25px -6px rgb(15 23 42 / 0.4), 
                       8px 8px 0 #020617,
                       -2px -2px 0 #854d0e;
            font-size: 1.1rem;
        }
        #home-screen .manly-btn:first-child:active {
            background: #fef08c;
            transform: scale(0.95) translateY(2px);
            box-shadow: 0 6px 12px -3px rgb(15 23 42 / 0.4), 
                       4px 4px 0 #020617;
        }

        .quote-card {
            background: linear-gradient(145deg, #1e2937, #0f172a);
            transition: transform 0.2s ease;
        }

        .nav-active {
            background-color: #1e2937;
            color: white;
        }

        .quote-text {
            font-size: 1.35rem;
            line-height: 1.4;
            font-weight: 600;
        }

        .app-container {
            max-width: 420px;
            margin: 0 auto;
            min-height: 100dvh;
            background: #020617;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
            position: relative;
            overflow: hidden;
            border: 8px solid #1e2937;
            border-radius: 3rem;
        }

        /* Comic book halftone + panel texture - more vibrant comic pop */
        .app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                /* Classic comic halftone dots - brighter yellow */
                radial-gradient(circle, rgba(245, 158, 11, 0.18) 2px, transparent 2px),
                radial-gradient(circle, rgba(245, 158, 11, 0.09) 1px, transparent 1px),
                /* Subtle diagonal action lines */
                linear-gradient(135deg, transparent 45%, rgba(251, 191, 36, 0.06) 50%, transparent 55%);
            background-size: 24px 24px, 14px 14px, 90px 90px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.85;
            mix-blend-mode: screen;
        }

        .app-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                /* Comic panel border lines - bolder */
                linear-gradient(to right, transparent 0%, rgba(15,23,42,0.25) 1.5%, transparent 3%),
                linear-gradient(to bottom, transparent 0%, rgba(15,23,42,0.2) 1.5%, transparent 3%);
            background-size: 100% 100%, 100% 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
        }

        /* Comic book style for quote cards - inked comic panel look */
        .quote-card {
            background: linear-gradient(145deg, #1e2937, #0f172a);
            border: 5px solid #0f172a;
            box-shadow: 8px 8px 0 #020617, 
                       -3px -3px 0 #334155,
                       0 0 0 2px #475569;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
        }

        .quote-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0 #020617, 
                       -4px -4px 0 #334155;
        }

        /* Bold comic title effect - strong inked comic lettering */
        .title-font {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 900;
            letter-spacing: -4px;
            color: #f8fafc;
            text-shadow: 
                4px 4px 0 #020617,
                -2px -2px 0 #1e2937;
            -webkit-text-stroke: 2px #020617;
        }

        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
        }

        .masculine-gradient {
            background: linear-gradient(to bottom, #1e2937, #0f172a);
        }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <!-- App Container -->

                            <!-- Inner foam detail -->
                            <path d="M19 15 Q24 11 29 14 Q33 11 37 15" stroke="#fefce8" stroke-width="2" fill="none"/>
                            <!-- Handle highlight line -->
                            <path d="M42 23 L46 23" stroke="#fefce8" stroke-width="2.5"/>
                            <!-- Classic comic speed lines - bolder -->

                            <line x1="1" y1="27" x2="10" y2="25" stroke="#854d0e" stroke-width="3" stroke-opacity="0.6"/>

            </div>

            <!-- Action Buttons -->
            <div class="px-6 pb-8 space-y-3 bg-slate-900 pt-4">
                <!-- Generate Button -->
                <button onclick="generateQuote()"
                        class="manly-btn w-full bg-white hover:bg-amber-50 active:bg-white text-slate-950 font-bold py-4 px-8 rounded-3xl flex items-center justify-center gap-x-3 text-xl shadow-xl">
                    <i class="fa-solid fa-sync fa-fw mr-2"></i>

                </button>

                <!-- Secondary Actions -->
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="saveToFavorites()"

                        <i class="fa-solid fa-heart text-xl text-red-400"></i>
                        <span class="text-xs font-semibold tracking-wider">SAVE</span>

                </div>
            </div>
        </div>

        <!-- FAVORITES SCREEN -->
        <div id="favorites-screen" class="screen h-full flex flex-col bg-slate-900">
            <!-- Header -->
            <div class="px-6 pt-8 pb-4 flex items-center justify-between border-b border-slate-800">
                <button onclick="showScreen('home-screen')"

                    <span class="font-semibold">Back</span>
                </button>
                <h2 class="font-black text-2xl tracking-tight">Favorites</h2>
                <button onclick="clearFavorites()"

                    <span class="hidden sm:inline">Clear All</span>

            </div>

            <!-- Favorites List -->
            <div class="flex-1 overflow-y-auto px-5 py-6" id="favorites-list">
                <!-- Populated by JS -->
            </div>

            <!-- Bottom Nav -->
            <div class="px-6 py-4 bg-slate-950 border-t border-slate-800 flex justify-center">
                <button onclick="showScreen('settings-screen')"
                        class="flex items-center gap-x-2 px-5 py-2 text-sm font-semibold text-slate-400 hover:text-white">
                    <i class="fa-solid fa-cog"></i>
                    <span>Go to Settings</span>
                </button>
            </div>
        </div>

        <!-- SETTINGS SCREEN -->
        <div id="settings-screen" class="screen h-full flex flex-col bg-slate-900">
            <!-- Header -->
            <div class="px-6 pt-8 pb-4 flex items-center border-b border-slate-800">
                <button onclick="showScreen('home-screen')" 
                        class="flex items-center gap-x-2 text-slate-400 hover:text-white">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span class="font-semibold">Back</span>
                </button>
                <h2 class="font-black text-2xl tracking-tight ml-4">Settings</h2>
            </div>

            <div class="px-6 py-8 space-y-8 flex-1">
                
                <!-- Notification Scheduler -->
                <div>
                    <div class="flex items-center justify-between mb-3 px-1">
                        <div>
                            <h3 class="font-bold text-lg">Daily Notifications</h3>
                            <p class="text-sm text-slate-400">Get a random quote every day</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="notif-toggle" onchange="toggleNotifications()" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
                        </label>
                    </div>

                    <div id="notification-controls" class="hidden bg-slate-800 border border-slate-700 rounded-3xl p-5 space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-300 mb-2">Time</label>
                            <input type="time" id="notif-time" value="07:00" 
                                   class="bg-slate-900 border border-slate-600 text-white rounded-2xl px-4 py-3 w-full focus:outline-none focus:border-amber-500">
                        </div>
                        
                        <button onclick="scheduleNotification()"
                                class="w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white font-bold py-3.5 rounded-3xl flex items-center justify-center gap-x-2">
                            <i class="fa-solid fa-bell"></i>
                            <span>SCHEDULE DAILY NOTIFICATION</span>
                        </button>
                        
                        <p id="notification-status" class="text-center text-xs text-emerald-400 font-medium"></p>
                    </div>
                </div>

                <!-- Quick Links -->
                <div class="space-y-3">
                    <button onclick="showScreen('favorites-screen')"
                            class="w-full flex items-center justify-between bg-slate-800 hover:bg-slate-700 border border-slate-700 px-6 py-4 rounded-3xl">
                        <div class="flex items-center gap-x-4">
                            <i class="fa-solid fa-heart text-red-400 text-xl w-6"></i>
                            <span class="font-semibold">View Favorites</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-500"></i>
                    </button>
                    
                    <div class="bg-slate-800 border border-slate-700 px-6 py-4 rounded-3xl text-sm">
                        <div class="flex justify-between items-center">
                            <span class="text-slate-300">Total Quotes in Database</span>
                            <span class="font-mono font-bold text-white">365</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="px-6 pb-8 text-center text-xs text-slate-500">
                Inspired by Boston Be A Man<br>
                <span class="font-mono text-[10px]">v1.0 • Built with grit</span>
            </div>
        </div>

    </div>

    <script>

        let quotes = [

            "When your wife asks what’s wrong, say 'nothing' and storm off. Be a man.",

            "When your team loses, blame the refs. Be a man.",
            "Never let anyone see you read a book. Be a man.",
            "If you’re in pain, just walk it off. Forever. Be a man.",
            "Don’t call people back. They’ll figure it out. Be a man.",
            "Always double down on bad decisions. Be a man."
        ];

        let currentQuote = "";
        let favorites = JSON.parse(localStorage.getItem('beaman_favorites')) || [];

        // Load favorites from localStorage
        function loadFavorites() {
            favorites = JSON.parse(localStorage.getItem('beaman_favorites')) || [];
        }

        // Save favorites to localStorage
        function saveFavoritesToStorage() {
            localStorage.setItem('beaman_favorites', JSON.stringify(favorites));
        }

        // Show specific screen
        function showScreen(screenId) {
            // Hide all screens
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            
            // Show target screen
            document.getElementById(screenId).classList.add('active');
            
            // If showing favorites, refresh the list
            if (screenId === 'favorites-screen') {
                renderFavorites();
            }
        }

        // Generate random quote
        function generateQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            currentQuote = quotes[randomIndex];
            
            const quoteEl = document.getElementById('quote-text');
            quoteEl.innerHTML = currentQuote;
            
            // Add a little animation
            quoteEl.style.opacity = '0';
            setTimeout(() => {
                quoteEl.style.transition = 'opacity 0.4s ease';
                quoteEl.style.opacity = '1';
            }, 50);
        }

        // Save current quote to favorites
        function saveToFavorites() {
            if (!currentQuote) {
                alert("Generate a quote first!");
                return;
            }
            
            if (favorites.includes(currentQuote)) {
                alert("Already in your favorites!");
                return;
            }
            
            favorites.unshift(currentQuote); // Add to beginning
            saveFavoritesToStorage();
            
            // Visual feedback
            const btns = document.querySelectorAll('button');
            btns.forEach(btn => {
                if (btn.innerText.includes('SAVE')) {
                    const originalText = btn.innerHTML;
                    btn.innerHTML = `<i class="fa-solid fa-check text-xl text-green-400"></i> <span class="text-xs font-semibold tracking-wider">SAVED!</span>`;
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                    }, 1200);
                }
            });
        }

        // Share current quote
        function shareQuote() {
            if (!currentQuote) {
                alert("Generate a quote first!");
                return;
            }
            
            const text = `"${currentQuote}" — Be A Man`;
            
            // Use Web Share API if available
            if (navigator.share) {
                navigator.share({
                    title: 'Be A Man',
                    text: text
                }).catch(() => {
                    fallbackShare(text);
                });
            } else {
                fallbackShare(text);
            }
        }

        function fallbackShare(text) {
            // Copy to clipboard as fallback
            navigator.clipboard.writeText(text).then(() => {
                const originalText = event.currentTarget?.innerHTML || '';
                alert("Quote copied to clipboard! You can now paste it anywhere.");
            }).catch(() => {
                // Last resort
                prompt("Copy this quote:", text);
            });
        }

        // Render favorites list
        function renderFavorites() {
            const container = document.getElementById('favorites-list');
            container.innerHTML = '';
            
            if (favorites.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 px-6">
                        <i class="fa-solid fa-heart text-5xl text-slate-700 mb-4"></i>
                        <p class="text-slate-400">No favorites yet.<br>Generate and save some quotes!</p>
                    </div>
                `;
                return;
            }
            
            favorites.forEach((quote, index) => {
                const div = document.createElement('div');
                div.className = `quote-card mb-3 p-5 rounded-3xl border border-slate-700 flex justify-between items-start gap-4`;
                div.innerHTML = `
                    <div class="flex-1">
                        <p class="text-white leading-snug">"${quote}"</p>
                    </div>
                    <div class="flex flex-col items-end gap-y-2">
                        <button onclick="removeFavorite(${index}, this)" 
                                class="text-red-400 hover:text-red-500 p-2 -mr-2 -mt-1">
                            <i class="fa-solid fa-trash text-lg"></i>
                        </button>
                        <button onclick="shareSpecificQuote('${quote.replace(/'/g, "\\'")}', this)" 
                                class="text-blue-400 hover:text-blue-500 p-2 -mr-2">
                            <i class="fa-solid fa-share text-lg"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function removeFavorite(index, element) {
            if (confirm("Remove this quote from favorites?")) {
                favorites.splice(index, 1);
                saveFavoritesToStorage();
                renderFavorites();
            }
        }

        function shareSpecificQuote(quote, element) {
            const text = `"${quote}" — Be A Man`;
            
            if (navigator.share) {
                navigator.share({ title: 'Be A Man', text: text });
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    const orig = element.innerHTML;
                    element.innerHTML = `<i class="fa-solid fa-check"></i>`;
                    setTimeout(() => {
                        element.innerHTML = orig;
                    }, 1500);
                });
            }
        }

        // Clear all favorites
        function clearFavorites() {
            if (confirm("Clear ALL favorites? This cannot be undone.")) {
                favorites = [];
                saveFavoritesToStorage();
                renderFavorites();
            }
        }

        // Notification functions
        function toggleNotifications() {
            const toggle = document.getElementById('notif-toggle');
            const controls = document.getElementById('notification-controls');
            
            if (toggle.checked) {
                controls.classList.remove('hidden');
                controls.classList.add('block');
            } else {
                controls.classList.add('hidden');
                controls.classList.remove('block');
            }
        }

        function scheduleNotification() {
            const timeInput = document.getElementById('notif-time').value;
            const statusEl = document.getElementById('notification-status');
            
            if (!timeInput) {
                alert("Please select a time");
                return;
            }
            
            // Save preference
            localStorage.setItem('beaman_notif_time', timeInput);
            localStorage.setItem('beaman_notifications_enabled', 'true');
            
            // For browser demo: Show confirmation
            statusEl.innerHTML = `✅ Daily notification set for <strong>${timeInput}</strong>`;
            
            // In a real native app this would use local notifications
            // For now we simulate it
            setTimeout(() => {
                if (confirm(`In a real app, you would get a notification every day at ${timeInput} with a random quote.\n\nWant to test one right now?`)) {
                    generateQuote();
                    showScreen('home-screen');
                }
            }, 800);
        }

        // Load saved notification time
        function loadNotificationSettings() {
            const savedTime = localStorage.getItem('beaman_notif_time');
            const enabled = localStorage.getItem('beaman_notifications_enabled') === 'true';
            
            const toggle = document.getElementById('notif-toggle');
            const controls = document.getElementById('notification-controls');
            const timeInput = document.getElementById('notif-time');
            
            if (savedTime) {
                timeInput.value = savedTime;
            }
            
            if (enabled) {
                toggle.checked = true;
                controls.classList.remove('hidden');
                controls.classList.add('block');
                document.getElementById('notification-status').innerHTML = 
                    `Daily at <strong>${savedTime || '07:00'}</strong>`;
            }
        }

        // Initialize the app
        function initApp() {
            loadFavorites();
            
            // Generate initial quote
            setTimeout(() => {
                generateQuote();
            }, 300);
            
            // Load notification settings
            loadNotificationSettings();
            
            // Keyboard support
            document.addEventListener('keydown', function(e) {
                if (e.key === '/' && document.getElementById('home-screen').classList.contains('active')) {
                    e.preventDefault();
                    generateQuote();
                }
            });
            
            // Make it feel more native
            console.log('%c[Be A Man] App initialized. Press / to generate quote.', 'color:#64748b');
        }

        // Boot the app
        window.onload = initApp;
        
        // Bonus: Make the whole quote area clickable to generate new one
        setTimeout(() => {
            const quoteArea = document.getElementById('quote-display');
            if (quoteArea) {
                quoteArea.style.cursor = 'pointer';
                quoteArea.onclick = () => generateQuote();
            }
        }, 1000);
    </script>
</body>
</html>
