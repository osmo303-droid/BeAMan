<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE A MAN</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;600;900&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { 
            font-family: 'Space Grotesk', sans-serif; 
            font-weight: 900; 
            letter-spacing: -4px; 
            text-shadow: 4px 4px 0 #020617;
        }
        
        .app-container {
            max-width: 420px;
            margin: 0 auto;
            min-height: 100dvh;
            background: #020617;
            border: 8px solid #1e2937;
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
            position: relative;
            overflow: hidden;
        }
        
        .app-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle, rgba(245,158,11,0.18) 2px, transparent 2px),
                linear-gradient(135deg, transparent 45%, rgba(251,191,36,0.08) 50%, transparent 55%);
            background-size: 24px 24px, 90px 90px;
            opacity: 0.9;
            pointer-events: none;
            z-index: 0;
        }
        
        .quote-card {
            background: linear-gradient(145deg, #1e2937, #0f172a);
            border: 5px solid #0f172a;
            box-shadow: 8px 8px 0 #020617;
        }
        
        .manly-btn {
            transition: all 0.2s;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <div class="app-container mx-auto relative z-10">

        <!-- HOME SCREEN -->
        <div id="home-screen" class="screen h-full flex flex-col">
            <div class="px-6 pt-8 pb-4 bg-slate-900">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="title-font text-5xl text-white">BE A MAN</h1>
                        <p class="text-amber-400 text-sm">Boston Style</p>
                    </div>
                    <div class="w-14 h-14">
                        <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M14 12 L14 44 Q14 48 18 48 L34 48 Q38 48 38 44 L38 12 Z" stroke="#020617" stroke-width="5" fill="#f59e0b"/>
                            <path d="M38 18 L46 18 Q49 18 49 21 L49 35 Q49 38 46 38 L38 38" stroke="#020617" stroke-width="5" fill="none"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="flex-1 px-6 pt-8 pb-6 flex flex-col">
                <div id="quote-display" class="quote-card flex-1 rounded-3xl p-8 flex items-center justify-center min-h-[260px]">
                    <div class="text-center">
                        <p id="quote-text" class="text-white text-xl leading-tight">
                            Tap "GENERATE QUOTE" to start being a man.
                        </p>
                    </div>
                </div>
            </div>

            <div class="px-6 pb-8 space-y-3 bg-slate-900 pt-4">
                <button onclick="generateQuote()" class="manly-btn w-full py-6 text-xl bg-amber-400 text-black rounded-3xl border-4 border-black">
                    GENERATE QUOTE
                </button>
                
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="saveToFavorites()" class="manly-btn py-4 bg-slate-800 rounded-3xl">
                        ❤️<br><span class="text-xs">SAVE</span>
                    </button>
                    <button onclick="shareQuote()" class="manly-btn py-4 bg-slate-800 rounded-3xl">
                        ↗<br><span class="text-xs">SHARE</span>
                    </button>
                    <button onclick="showScreen('settings-screen')" class="manly-btn py-4 bg-slate-800 rounded-3xl">
                        ⚙<br><span class="text-xs">SETTINGS</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- FAVORITES SCREEN -->
        <div id="favorites-screen" class="screen h-full flex flex-col bg-slate-900 hidden">
            <div class="px-6 pt-8 pb-4 flex items-center justify-between border-b border-slate-700">
                <button onclick="showScreen('home-screen')" class="text-amber-400">← Back</button>
                <h2 class="font-bold text-2xl">My Favorites</h2>
                <button onclick="clearFavorites()" class="text-red-400">Clear All</button>
            </div>
            <div id="favorites-list" class="flex-1 p-6 overflow-auto space-y-4"></div>
        </div>

        <!-- SETTINGS SCREEN -->
        <div id="settings-screen" class="screen h-full flex flex-col bg-slate-900 hidden">
            <div class="px-6 pt-8 pb-4 flex items-center border-b border-slate-700">
                <button onclick="showScreen('home-screen')" class="text-amber-400">← Back</button>
                <h2 class="font-bold text-2xl ml-4">Settings</h2>
            </div>
            
            <div class="p-6 space-y-6">
                <!-- Notifications -->
                <div>
                    <h3 class="font-bold mb-4">Daily Notifications</h3>
                    <div class="bg-slate-800 rounded-3xl p-5">
                        <input type="time" id="notif-time" value="08:00" class="bg-slate-900 w-full p-4 rounded-2xl text-white">
                        <button onclick="scheduleDailyNotification()" class="w-full mt-4 bg-emerald-600 py-4 rounded-3xl font-bold">
                            SCHEDULE DAILY QUOTE
                        </button>
                    </div>
                </div>

                <!-- Favorites -->
                <button onclick="showScreen('favorites-screen')" 
                        class="w-full bg-slate-800 hover:bg-slate-700 py-5 rounded-3xl font-semibold flex items-center justify-center gap-3">
                    ❤️ My Favorites
                </button>

                <!-- Privacy -->
                <button onclick="showPrivacyPolicy()" 
                        class="w-full bg-slate-800 py-5 rounded-3xl font-semibold">
                    Privacy Policy
                </button>
            </div>
        </div>
    </div>

    <script>
        let quotes = [];
        let currentQuote = "";
        let favorites = JSON.parse(localStorage.getItem('beaman_favorites')) || [];

        async function loadQuotes() {
            try {
                const res = await fetch('quotes.json');
                quotes = await res.json();
            } catch (e) {
                quotes = ["Don’t go food shopping. Starve. Die. Be a man."];
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'favorites-screen') renderFavorites();
        }

        function generateQuote() {
            if (quotes.length === 0) return;
            const random = Math.floor(Math.random() * quotes.length);
            currentQuote = quotes[random];
            document.getElementById('quote-text').textContent = currentQuote;
        }

        function saveToFavorites() {
            if (!currentQuote) return alert("Generate a quote first!");
            if (favorites.includes(currentQuote)) return alert("Already saved!");
            favorites.unshift(currentQuote);
            localStorage.setItem('beaman_favorites', JSON.stringify(favorites));
            alert("✅ Saved to Favorites!");
        }

        function shareQuote() {
            if (!currentQuote) return;
            const text = `"${currentQuote}" — Be A Man`;
            navigator.share ? navigator.share({text}) : (navigator.clipboard.writeText(text), alert("Copied!"));
        }

        function renderFavorites() {
            const container = document.getElementById('favorites-list');
            container.innerHTML = '';
            if (favorites.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 py-12">No favorites yet.<br>Tap ❤️ SAVE on home screen.</p>';
                return;
            }
            favorites.forEach(q => {
                const div = document.createElement('div');
                div.className = "quote-card p-6 rounded-3xl";
                div.innerHTML = `<p class="text-white">${q}</p>`;
                container.appendChild(div);
            });
        }

        function clearFavorites() {
            if (confirm("Clear all favorites?")) {
                favorites = [];
                localStorage.setItem('beaman_favorites', JSON.stringify(favorites));
                renderFavorites();
            }
        }

        function scheduleDailyNotification() {
            const time = document.getElementById('notif-time').value;
            if (!time) return;
            localStorage.setItem('beaman_notif_time', time);
            alert(`✅ Daily notification scheduled at ${time}`);
        }

        function showPrivacyPolicy() {
            window.open('privacy.html', '_blank');
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        // Init
        window.onload = async () => {
            await loadQuotes();
            generateQuote();
        };
    </script>
</body>
</html>
